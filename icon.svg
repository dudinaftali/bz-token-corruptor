<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#c0392b"/>

  <!-- Skull -->
  <ellipse cx="64" cy="54" rx="28" ry="26" fill="white"/>
  <!-- Jaw -->
  <rect x="44" y="72" width="40" height="16" rx="4" fill="white"/>
  <!-- Teeth gaps -->
  <rect x="53" y="76" width="6" height="12" rx="2" fill="#c0392b"/>
  <rect x="63" y="76" width="6" height="12" rx="2" fill="#c0392b"/>
  <rect x="73" y="76" width="6" height="12" rx="2" fill="#c0392b"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="52" rx="8" ry="9" fill="#c0392b"/>
  <ellipse cx="76" cy="52" rx="8" ry="9" fill="#c0392b"/>
  <!-- Nose -->
  <ellipse cx="64" cy="63" rx="4" ry="3" fill="#c0392b"/>

  <!-- Broken key shank at bottom -->
  <rect x="56" y="88" width="8" height="20" rx="3" fill="white"/>
  <rect x="64" y="96" width="10" height="5" rx="2" fill="white"/>
  <rect x="64" y="104" width="7" height="5" rx="2" fill="white"/>

  <!-- Crack/lightning bolt across skull -->
  <polyline points="68,30 62,48 70,48 60,74" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
